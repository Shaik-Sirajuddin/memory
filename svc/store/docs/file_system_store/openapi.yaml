openapi: 3.1.0
info:
  title: File System Store API
  version: 1.0.0
  description: |
    OpenAPI specification for the filesystem-backed store routes exposed by the store package.

servers:
  - url: http://localhost:8080

tags:
  - name: instructions
  - name: folders
  - name: subscriptions

paths:
  /v1/instructions:
    get:
      tags: [instructions]
      summary: Get merged instructions
      operationId: getInstructions
      parameters:
        - $ref: "#/components/parameters/AccountPrefix"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Path"
        - $ref: "#/components/parameters/FileName"
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Merged instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/meta:
    get:
      tags: [instructions]
      summary: Get instruction metadata
      operationId: getInstructionsMeta
      parameters:
        - $ref: "#/components/parameters/AccountPrefix"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Path"
        - $ref: "#/components/parameters/FileName"
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Instruction metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionMeta"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/partial:
    get:
      tags: [instructions]
      summary: Get a partial merged instruction view
      operationId: getInstructionsPartial
      parameters:
        - $ref: "#/components/parameters/AccountPrefix"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Path"
        - $ref: "#/components/parameters/FileName"
        - $ref: "#/components/parameters/SessionID"
        - $ref: "#/components/parameters/Start"
        - $ref: "#/components/parameters/End"
      responses:
        "200":
          description: Partial instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/append:
    post:
      tags: [instructions]
      summary: Append instructions
      operationId: appendInstructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionMutationRequest"
      responses:
        "200":
          description: Updated merged instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/update:
    post:
      tags: [instructions]
      summary: Update instructions
      operationId: updateInstructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionMutationRequest"
      responses:
        "200":
          description: Updated merged instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/delete:
    post:
      tags: [instructions]
      summary: Delete instructions by sequence number
      operationId: deleteInstructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionDeleteRequest"
      responses:
        "200":
          description: Updated merged instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/instructions/discard:
    post:
      tags: [instructions]
      summary: Discard session-specific instructions by sequence number
      operationId: discardInstructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionDeleteRequest"
      responses:
        "200":
          description: Updated merged instruction document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInstructionDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/folders/index:
    get:
      tags: [folders]
      summary: List files and folders in a path
      operationId: getFolderIndex
      parameters:
        - $ref: "#/components/parameters/AccountPrefix"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Path"
      responses:
        "200":
          description: Folder listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeFolderEntries"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/subscriptions/stream:
    get:
      tags: [subscriptions]
      summary: Stream store events with SSE
      operationId: subscribeInstructionsStream
      parameters:
        - $ref: "#/components/parameters/AccountPrefix"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Path"
        - $ref: "#/components/parameters/FileName"
        - $ref: "#/components/parameters/SessionID"
        - $ref: "#/components/parameters/IgnoreSelf"
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    AccountPrefix:
      name: account_prefix
      in: query
      required: false
      schema:
        type: string
      description: Normalized account prefix such as `u_123` or `t_456`.
    Bucket:
      name: bucket
      in: query
      required: false
      schema:
        type: string
        default: default
      description: Target bucket name.
    Path:
      name: path
      in: query
      required: false
      schema:
        type: string
      description: Relative folder path under the bucket.
    FileName:
      name: file_name
      in: query
      required: false
      schema:
        type: string
      description: Target instruction filename.
    SessionID:
      name: session_id
      in: query
      required: false
      schema:
        type: string
      description: Session identifier used for temp branches and subscription filtering.
    Start:
      name: start
      in: query
      required: false
      schema:
        type: integer
        format: int32
      description: Start index for partial reads.
    End:
      name: end
      in: query
      required: false
      schema:
        type: integer
        format: int32
      description: End index for partial reads.
    IgnoreSelf:
      name: ignore_self
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: Suppress events originating from the same session.

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
      required: [error]

    EnvelopeInstructionDocument:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/InstructionDocument"
      required: [data]

    EnvelopeInstructionMeta:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/InstructionMeta"
      required: [data]

    EnvelopeFolderEntries:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FolderEntry"
      required: [data]

    InstructionMutationRequest:
      type: object
      additionalProperties: false
      properties:
        account_prefix:
          type: string
        bucket:
          type: string
          default: default
        path:
          type: string
        file_name:
          type: string
        session_id:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
      required: [rules]

    InstructionDeleteRequest:
      type: object
      additionalProperties: false
      properties:
        account_prefix:
          type: string
        bucket:
          type: string
          default: default
        path:
          type: string
        file_name:
          type: string
        session_id:
          type: string
        seq_no:
          type: array
          items:
            type: integer
            format: int32
      required: [seq_no]

    InstructionDocument:
      type: object
      additionalProperties: false
      properties:
        ID:
          $ref: "#/components/schemas/InstructionID"
        Raw:
          type: string
        Rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
        UpdatedAt:
          type: string
          format: date-time
      required: [ID, Raw, Rules, UpdatedAt]

    InstructionMeta:
      type: object
      additionalProperties: false
      properties:
        ID:
          $ref: "#/components/schemas/InstructionID"
        Path:
          type: string
        Size:
          type: integer
          format: int64
        Mode:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
      required: [ID, Path, Size, Mode, CreatedAt, UpdatedAt]

    FolderEntry:
      type: object
      additionalProperties: false
      properties:
        Name:
          type: string
        Format:
          type: string
        Size:
          type: integer
          format: int64
        UpdatedAt:
          type: string
          format: date-time
        CreatedAt:
          type: string
          format: date-time
        IsDir:
          type: boolean
        Path:
          type: string
      required: [Name, Format, Size, UpdatedAt, CreatedAt, IsDir, Path]

    InstructionID:
      type: object
      additionalProperties: false
      properties:
        AccountPrefix:
          type: string
        Bucket:
          type: string
        Path:
          type: string
        FileName:
          type: string
        SessionID:
          type: string
      required: [Bucket, Path]

    Rule:
      type: object
      additionalProperties: false
      properties:
        Command:
          type: string
        Seqno:
          type: integer
          format: int32
      required: [Command, Seqno]
