type : service 

codebase : 
  lang : go 

specifications: 
  - name : file_system_heirarchy 
    details :
    - 1.main_file_path is formed by join of (account_identifier,bucket,file_path,file_name)
    - account_identifier starts with u_ for users or t_ for teams identified from Header X-Account-ID , X-Team-ID
    - append t_ when X-Team-ID is present else u_
    - resolve bucket , file path from request headers instead of request params 
    - bucket is set to default when empty 
    - file_path can contain nested directory resolution
    - append a account_identifier path to main_file_path
    - 2.account_identifier_path is formed by service-account-key:sessionSequence.ext
    - obtain sessionSequence from redis by passing service-account-key , session-id from header 
    - join file_path + file_name + account_identifier to form a path 

    
interfaces : store 
modules : 
  - name : file_system_store
    implements : store 
    instructions : 
    - use linux native file system 
    - the file system takes a path from env for global root directory 
    - refer specification:file_system_heirarchy
    - refer file:svc/store/temp_file_format.txt for format specification of write 
    - file read request, merge main_file + session specific file details use internal/rule_merger/merge_file_partial  return partial or whole content based on request 
    - store subscribe events for a file or folder in a map for sessions 
    - maintain a min set of paths for a session to checks for event selection 
    - maintain a rule_merger object inside struct 
    - subscribe to rule_merger pub-sub  
    - emit events to subscribed session for associated files
    - additionally write methods to fetch index of a gives folder path (name, format , size , update_time , create_time)

routes : 
  info : implement http routes for interface:store 

instructions : 
 - implement modules  
 - initialize a interface:store with module:file_system_store
 - implement routes
 - expose http server 
 - assume server routes are authenticated as traffic is allowed only from a specific auth service in between 