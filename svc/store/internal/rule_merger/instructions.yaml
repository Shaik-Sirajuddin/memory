codebase :
  lang : go 

action : 
  name : merge_file 
  type: job 
  scope : internal
  description : to create a long term main version of a file 
  instructions:
  - a file is indentified by a root , path strings , 
  - temporary files written by an agent use file:temp_file_format.txt , main version of file users file:file_format.txt
  - branches of a file exist at the same path with changed additional tag in names
  - ex : file-name:service-account-key:sessionSequence.ext
  - instruction : merge individual branches of a file 
    merge_steps: 
    - combine temp_file contents in order of timestamp
    - acquire a lock on main file 
    - apply the operations the original file in the order of the timestamp 
    - keep a track of the seqno of rules which are modified in main file 
    - step  : iterate in modified seqno iterator i 
      invoke: workflow:unique_rule
      params : 
        - rules 
          - i-1 rule 
          - i rule 
          - i + 1 rule 
      post_action: 
      - replace i-1,i,i+1 rules with result
    - update the file contents 
    - release lock 
    - remove the contents of the invidual temp_files until the timestamps read
    - send an event of file updated with updated list of seqno to store 
  - increment file version 

routes : 
  route: enque

workflow : 
  name : unique_rule
  description : unique_rule
  params : 
   - rules 
  steps :
   - use an agent to identify rule similarity with previous , next rule
   - remove identical rules 
   - form reduced rule ordered set 
  response : 
    - rules 

instructions:
    - implement internal queue to handle request of a file
    - expose routes as public functions in struct 
    - use redis to maintain last proceed times
    - live process queue
    - maintain a min gap of 10 seconds for processal , 
    - enque_with_timeout : enqueue the file with a 10 seconds timeout in queue 
    - store enque_with_timeout in cache 
    - prevent enqueuing duplicate requests in queue by checking file id existing through cache 
    - use action_merge_file to process
    - the struct rule merger is intended to be used by a store 
    - above rule merger struct is defined for a file system store 