name: GeminiCLI
type: interactive_and_exec_cli
source: https://geminicli.com/docs/reference/commands/
settings_source: https://geminicli.com/docs/reference/configuration/
version: 0.37.0
legend:
  I: interactive_only   # works inside Gemini CLI REPL (/ commands)
  N: non_interactive    # works via CLI args / exec mode
  B: both               # works in both contexts

# ============================================================
# CLI COMMANDS (ENTRYPOINT)
# ============================================================
cli_commands:

  - name: gemini
    mode: B
    category: session
    description: Start interactive session
    input:
      args:
        - prompt: optional string
      options:
        - --acp: boolean            # Agent Communication Protocol mode
        - --approval-mode: enum [default, auto_edit, plan, yolo]
        - --allowed-mcp-server-names: string  # comma-separated
        - --allowed-tools: string             # comma-separated
        - --yolo: boolean           # auto-approve all tool calls (legacy)
    output:
      type: session
      schema:
        session_started: boolean

  - name: gemini --version
    mode: N
    category: system
    description: Show CLI version
    input: { args: [] }
    output:
      type: string

  - name: gemini --help
    mode: N
    category: system
    description: Show help
    input: { args: [] }
    output:
      type: text

# ============================================================
# CLI FLAGS
# ============================================================
cli_flags:
  - flag: --acp
    type: boolean
    description: Start in Agent Communication Protocol mode
  - flag: --approval-mode
    type: enum [default, auto_edit, plan, yolo]
    description: Tool approval mode
  - flag: --allowed-mcp-server-names
    type: string
    description: Comma-separated list of MCP server names to allow
  - flag: --allowed-tools
    type: string
    description: Comma-separated tool names that bypass confirmation dialogs
  - flag: --yolo
    type: boolean
    description: Auto-approve all tool calls (legacy alias for approval-mode yolo)

# ============================================================
# SLASH COMMANDS (INTERACTIVE ONLY)
# ============================================================
slash_commands:

  system:
    - name: /about
      mode: I
      description: Display version information
    - name: /help
      aliases: [/?]
      mode: I
      description: Show help and available commands
    - name: /quit
      aliases: [/exit]
      mode: I
      description: Terminate the CLI session
    - name: /clear
      mode: I
      description: Clear terminal screen including visible session history
      shortcut: Ctrl+L
    - name: /stats
      mode: I
      description: Display session statistics
      input:
        subcommands: [session, model, tools]
    - name: /docs
      mode: I
      description: Open documentation in browser
    - name: /bug
      mode: I
      description: File a GitHub issue
    - name: /privacy
      mode: I
      description: Display privacy notice and consent options

  session:
    - name: /chat
      aliases: [/resume]
      mode: I
      description: Browse and resume previous conversation sessions; manage checkpoints
      input:
        subcommands:
          - list
          - save <tag>
          - resume <tag>
          - delete <tag>
          - share [filename]
          - debug
    - name: /rewind
      mode: I
      description: Navigate backward through conversation history
      shortcut: Esc×2
    - name: /restore
      mode: I
      description: Revert files to pre-tool execution state
      input:
        args: [tool_call_id: optional string]
    - name: /compress
      mode: I
      description: Replace chat context with a summary
    - name: /copy
      mode: I
      description: Copy last CLI output to clipboard

  configuration:
    - name: /model
      mode: I
      description: Manage model configuration
      input:
        subcommands:
          - manage
          - set <model-name> [--persist]
    - name: /settings
      mode: I
      description: Open settings editor for CLI behavior
    - name: /theme
      mode: I
      description: Change visual theme
    - name: /editor
      mode: I
      description: Select supported editors
    - name: /terminal-setup
      mode: I
      description: Configure keybindings for multiline input
    - name: /vim
      mode: I
      description: Toggle vim mode with NORMAL/INSERT modes
    - name: /auth
      mode: I
      description: Change authentication method
    - name: /upgrade
      mode: I
      description: Open upgrade page (Google login only)

  memory_context:
    - name: /memory
      mode: I
      description: Manage instructional context from GEMINI.md
      input:
        subcommands:
          - add <text>
          - list
          - refresh
          - show
    - name: /init
      mode: I
      description: Generate tailored GEMINI.md context file
    - name: /directory
      aliases: [/dir]
      mode: I
      description: Manage workspace directories
      input:
        subcommands:
          - add <path1>,<path2>
          - show

  tools_extensions:
    - name: /tools
      mode: I
      description: Display available tools
      input:
        subcommands: [desc, nodesc]
    - name: /extensions
      mode: I
      description: Manage extensions
      input:
        subcommands: [config, disable, enable, explore, install, link, list, restart, uninstall, update [--all]]
    - name: /mcp
      mode: I
      description: Manage MCP servers
      input:
        subcommands: [auth [<server-name>], desc, disable, enable, list, reload, schema]
    - name: /skills
      mode: I
      description: Manage agent skills
      input:
        subcommands: [disable <name>, enable <name>, list, reload]

  agents_workspace:
    - name: /agents
      mode: I
      description: Manage local and remote subagents
      input:
        subcommands: [list, reload, enable <name>, disable <name>, config <name>]
    - name: /plan
      mode: I
      description: Switch to Plan Mode (read-only)
      input:
        subcommands: [copy]
    - name: /shells
      aliases: [/bashes]
      mode: I
      description: Toggle background shells view
    - name: /ide
      mode: I
      description: IDE integration management
      input:
        subcommands: [disable, enable, install, status]
    - name: /setup-github
      mode: I
      description: Configure GitHub Actions integration

  hooks_permissions:
    - name: /hooks
      mode: I
      description: Manage lifecycle hooks
      input:
        subcommands: [disable-all, disable <name>, enable-all, enable <name>, list, show, panel]
    - name: /permissions
      mode: I
      description: Manage folder trust settings
      input:
        subcommands: [trust [<directory-path>]]
    - name: /policies
      mode: I
      description: Policy management
      input:
        subcommands: [list]
    - name: /commands
      mode: I
      description: Manage custom slash commands
      input:
        subcommands: [reload]

  input_shortcuts:
    - name: "@<path>"
      mode: I
      description: Inject file or directory contents into the current prompt
    - name: "!"
      mode: I
      description: Toggle shell mode or prefix a shell command to execute directly
      note: Sets GEMINI_CLI=1 in subprocess environment

# ============================================================
# KEYBOARD SHORTCUTS (INTERACTIVE)
# ============================================================
keyboard_shortcuts:
  - shortcut: Ctrl+L
    action: /clear
  - shortcut: Esc×2
    action: /rewind
  - shortcut: Alt+z / Cmd+z
    action: Undo last action
  - shortcut: Shift+Alt+Z / Shift+Cmd+Z
    action: Redo last action
  - shortcut: Ctrl+K
    action: Open search modal

# ============================================================
# CONFIGURATION
# ============================================================
configuration:
  schema: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/schemas/settings.schema.json

  file_paths:
    system_defaults_linux: /etc/gemini-cli/system-defaults.json
    system_defaults_macos: /Library/Application Support/GeminiCli/system-defaults.json
    system_defaults_windows: C:\ProgramData\gemini-cli\system-defaults.json
    user: ~/.gemini/settings.json
    project: .gemini/settings.json
    system_override_linux: /etc/gemini-cli/settings.json
    system_override_macos: /Library/Application Support/GeminiCli/settings.json
    system_override_windows: C:\ProgramData\gemini-cli\settings.json
    shell_history: ~/.gemini/tmp/<project_hash>/shell_history
    memory: GEMINI.md | .gemini/GEMINI.md
    custom_commands_user: ~/.gemini/commands/*.toml
    custom_commands_project: .gemini/commands/*.toml

  precedence:
    - system_override   # highest
    - env_vars_dotenv
    - project           # .gemini/settings.json
    - user              # ~/.gemini/settings.json
    - system_defaults
    - hardcoded         # lowest

  env_overrides:
    GEMINI_CLI_SYSTEM_DEFAULTS_PATH: Custom system defaults path
    GEMINI_CLI_SYSTEM_SETTINGS_PATH: Custom system settings path
    GEMINI_CLI_HOME: Root directory for user config

  environment_variables:
    auth:
      GEMINI_API_KEY: Gemini API authentication key
      GOOGLE_API_KEY: Google Cloud API key (Vertex AI express mode)
      GOOGLE_APPLICATION_CREDENTIALS: Path to service account JSON
      GOOGLE_CLOUD_PROJECT: GCP project ID
      GOOGLE_CLOUD_LOCATION: GCP location (e.g. us-central1)
      GOOGLE_GENAI_API_VERSION: Gemini API version override
    model:
      GEMINI_MODEL: Default model name
      GEMINI_SANDBOX: Sandbox execution (true/false/docker/podman/command)
      GEMINI_SYSTEM_MD: Path to custom system prompt override
      GEMINI_WRITE_SYSTEM_MD: Write built-in system prompt to file
    ide:
      GEMINI_CLI_IDE_PID: Manual IDE process ID
      GEMINI_CLI_SURFACE: Custom User-Agent label for API tracking
    telemetry:
      GEMINI_TELEMETRY_ENABLED: Enable/disable telemetry
      GEMINI_TELEMETRY_TARGET: Destination (local/gcp)
      GEMINI_TELEMETRY_OTLP_ENDPOINT: OTLP endpoint URL
      GEMINI_TELEMETRY_OTLP_PROTOCOL: Protocol (grpc/http)
      GEMINI_TELEMETRY_LOG_PROMPTS: Include prompts in logs
      GEMINI_TELEMETRY_OUTFILE: Local telemetry file path
      GEMINI_TELEMETRY_USE_COLLECTOR: Use external OTLP collector
    display:
      NO_COLOR: Disable all color output
      CLI_TITLE: Custom CLI window title
      DEBUG: Enable verbose logging

  key_settings:
    general:
      defaultApprovalMode: enum [default, auto_edit, plan]
      preferredEditor: string
      vimMode: boolean
      enableAutoUpdate: boolean
      checkpointing.enabled: boolean
      sessionRetention.enabled: boolean
      sessionRetention.maxAge: string  # e.g. "30d", "7d", "24h"
    model:
      name: string
      maxSessionTurns: integer  # -1 = unlimited
      compressionThreshold: float  # 0.0-1.0
    tools:
      sandbox: string | boolean
      allowed: string[]
      exclude: string[]
      shell.enableInteractiveShell: boolean
    security:
      toolSandboxing: boolean
      disableYoloMode: boolean
      folderTrust.enabled: boolean
    hooksConfig:
      enabled: boolean
      disabled: string[]
    hooks: object  # BeforeTool | AfterTool | BeforeAgent | AfterAgent | ...
    mcpServers: object  # <server-name>: { command, args, env, url, trust, ... }

# ============================================================
# META
# ============================================================
meta:
  execution_modes:
    interactive:
      supports: slash_commands, at_commands, shell_mode
      persistent_context: true
      session_persistence: true
    non_interactive:
      supports: cli_flags
      persistent_context: false
  key_differences:
    - interactive mode = stateful REPL with rich slash command set
    - Plan mode (/plan) = read-only, no tool execution
    - yolo / auto_edit modes = reduced confirmation dialogs
    - session checkpoints via /chat save <tag>
    - custom slash commands via .toml files in .gemini/commands/
  gaps:
    - no explicit headless/print flag equivalent to claude -p
    - session IDs mostly internal; resume via /chat or /resume
